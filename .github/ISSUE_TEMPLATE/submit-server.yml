---
name: Submit MCP Server
description: Suggest an MCP server for inclusion in the catalog
title: "[Submission] "
labels: []
body:
  - type: markdown
    attributes:
      value: |
        Thanks for submitting an MCP server! A maintainer will review your
        submission and apply the `submission` label to trigger the AI
        enrichment pipeline.

  - type: input
    id: server_identifier
    attributes:
      label: Server identifier
      description: |
        Provide one of:
        - GitHub/Bitbucket/GitLab URL (e.g. `https://github.com/org/repo`)
        - npm package name (e.g. `@scope/package-name`)
        - uvx/PyPI package name (e.g. `mcp-server-foo`)
        - Docker image name (e.g. `docker.io/org/image:tag`)
      placeholder: "https://github.com/org/mcp-server-name"
    validations:
      required: true

  - type: textarea
    id: why_useful
    attributes:
      label: Why is this server useful?
      description: >
        Optional — tell us what this server does well, any gotchas you've
        discovered, or why you think it belongs in the catalog.
      placeholder: "It handles X better than Y because..."
    validations:
      required: false

  - type: checkboxes
    id: not_duplicate
    attributes:
      label: Duplicate check
      options:
        - label: I searched the catalog and this server is not already listed
          required: true
