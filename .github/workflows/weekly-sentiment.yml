---
name: Weekly Reddit Sentiment

on:
  schedule:
    - cron: "0 4 * * 1"  # Monday 4am UTC (2 hours after refresh)
  workflow_dispatch:

jobs:
  sentiment:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main  # Always pull latest (refresh job may have just committed)

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install anthropic requests

      - name: Run sentiment analysis
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/sentiment.py

      - name: Commit sentiment update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stats.json config.json
          git diff --cached --quiet || git commit -m "chore: weekly sentiment update"
          git push
